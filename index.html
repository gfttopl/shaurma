<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Горська Шаурма</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Roboto', system-ui, -apple-system, sans-serif;
        }

        :root {
            --primary: #B3541C;
            --primary-dark: #8B3E12;
            --secondary: #2E7D32;
            --accent: #F4A261;
            --dark: #2C3E50;
            --light: #F8F4E9;
            --gray: #E0D6CC;
            --success: #27AE60;
            --shadow-sm: 0 4px 12px rgba(0,0,0,0.08);
            --shadow-md: 0 8px 24px rgba(0,0,0,0.12);
            --shadow-lg: 0 16px 32px rgba(0,0,0,0.16);
        }

        body {
            background: linear-gradient(145deg, var(--light) 0%, #E8DDD0 100%);
            min-height: 100vh;
            padding: 20px 16px 100px;
            position: relative;
            color: var(--dark);
        }

        /* Горный фон */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: repeating-linear-gradient(45deg, rgba(44,62,80,0.02) 0px, rgba(44,62,80,0.02) 20px, transparent 20px, transparent 40px);
            pointer-events: none;
            z-index: 0;
        }

        /* Декоративные горы */
        .mountains {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 80px;
            background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 120" preserveAspectRatio="none" opacity="0.15"><path d="M0,0V46.29c47.79,22.2,103.59,32.17,158,28,70.36-5.37,136.33-33.31,206.8-37.5C438.64,32.43,512.34,53.67,583,72.05c69.27,18,138.3,24.88,209.4,13.08,36.15-6,69.85-17.84,104.45-29.34C989.49,25,1113-14.29,1200,52.47V0Z" fill="%232C3E50"></path></svg>');
            background-size: cover;
            pointer-events: none;
            z-index: 0;
        }

        .app {
            position: relative;
            z-index: 2;
            max-width: 600px;
            margin: 0 auto;
        }

        /* Анимации */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-5px); }
            100% { transform: translateY(0px); }
        }

        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }

        /* Header */
        .header {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
            padding: 24px 20px;
            border-radius: 32px 32px 32px 32px;
            box-shadow: var(--shadow-lg);
            margin-bottom: 24px;
            position: relative;
            overflow: hidden;
            animation: fadeInUp 0.6s ease;
            border: 1px solid rgba(255,215,140,0.3);
        }

        .header::after {
            content: "⛰️";
            position: absolute;
            right: 20px;
            bottom: 10px;
            font-size: 70px;
            opacity: 0.2;
            transform: rotate(-5deg);
            animation: float 3s ease-in-out infinite;
        }

        .header h1 {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 5px;
            text-shadow: 2px 4px 8px rgba(0,0,0,0.3);
            letter-spacing: -0.5px;
        }

        .header p {
            font-size: 15px;
            opacity: 0.95;
            font-weight: 300;
        }

        /* Cart Summary */
        .cart-summary {
            background: linear-gradient(145deg, var(--dark) 0%, #1A2B3C 100%);
            color: white;
            padding: 18px 20px;
            border-radius: 60px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: var(--shadow-md);
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1);
            border: 1px solid rgba(255,215,140,0.2);
            animation: fadeInUp 0.6s ease 0.1s both;
        }

        .cart-summary:active {
            transform: scale(0.97);
            box-shadow: var(--shadow-sm);
        }

        .cart-summary.empty {
            background: #7F8C8D;
            opacity: 0.8;
        }

        .cart-summary .cart-icon {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 18px;
            font-weight: 500;
        }

        .cart-summary .cart-total {
            font-size: 22px;
            font-weight: 700;
            background: rgba(255,255,255,0.15);
            padding: 8px 20px;
            border-radius: 40px;
            backdrop-filter: blur(4px);
        }

        /* Categories */
        .categories {
            display: flex;
            gap: 12px;
            overflow-x: auto;
            padding: 5px 0 25px;
            scrollbar-width: none;
            animation: fadeInUp 0.6s ease 0.2s both;
        }

        .categories::-webkit-scrollbar {
            display: none;
        }

        .category-btn {
            background: white;
            border: none;
            padding: 14px 28px;
            border-radius: 60px;
            font-size: 16px;
            font-weight: 600;
            color: var(--dark);
            box-shadow: var(--shadow-sm);
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.2s;
            border: 2px solid transparent;
            backdrop-filter: blur(10px);
            background: rgba(255,255,255,0.9);
        }

        .category-btn.active {
            background: var(--primary);
            color: white;
            border-color: white;
            box-shadow: 0 8px 20px rgba(179,84,28,0.4);
            transform: translateY(-2px);
        }

        .category-btn:active {
            transform: scale(0.95);
        }

        /* Menu Grid */
        .menu-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 18px;
            margin-bottom: 30px;
            animation: fadeInUp 0.6s ease 0.3s both;
        }

        .menu-item {
            background: rgba(255,255,255,0.9);
            backdrop-filter: blur(10px);
            border-radius: 28px;
            padding: 18px 12px;
            box-shadow: var(--shadow-sm);
            transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1);
            cursor: pointer;
            border: 1px solid rgba(179,84,28,0.1);
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        .menu-item:hover {
            transform: translateY(-6px);
            box-shadow: var(--shadow-lg);
            border-color: var(--primary);
        }

        .menu-item:active {
            transform: scale(0.96);
        }

        .menu-item .emoji-bg {
            font-size: 56px;
            margin-bottom: 10px;
            filter: drop-shadow(0 6px 8px rgba(0,0,0,0.1));
            animation: float 4s ease-in-out infinite;
        }

        .menu-item h3 {
            font-size: 16px;
            color: var(--dark);
            margin-bottom: 8px;
            font-weight: 700;
            line-height: 1.3;
        }

        .menu-item .price {
            color: var(--primary);
            font-weight: 800;
            font-size: 20px;
            margin-bottom: 8px;
        }

        .menu-item .add-badge {
            background: var(--secondary);
            color: white;
            padding: 6px 16px;
            border-radius: 40px;
            font-size: 13px;
            font-weight: 600;
            display: inline-block;
            transition: all 0.2s;
            box-shadow: 0 4px 8px rgba(46,125,50,0.3);
        }

        .menu-item .add-badge:active {
            transform: scale(0.9);
        }

        /* Floating Order Button */
        .floating-order-btn {
            position: fixed;
            bottom: 20px;
            left: 16px;
            right: 16px;
            max-width: 568px;
            margin: 0 auto;
            background: linear-gradient(145deg, var(--secondary), #1B5E20);
            color: white;
            border: none;
            padding: 18px 24px;
            border-radius: 60px;
            font-size: 20px;
            font-weight: 700;
            box-shadow: var(--shadow-lg);
            cursor: pointer;
            display: none;
            align-items: center;
            justify-content: center;
            gap: 12px;
            z-index: 100;
            border: 2px solid rgba(255,255,255,0.3);
            backdrop-filter: blur(8px);
            animation: slideUp 0.4s ease, pulse 2s infinite;
        }

        .floating-order-btn.show {
            display: flex;
        }

        .floating-order-btn:active {
            transform: scale(0.97);
        }

        @keyframes slideUp {
            from { transform: translateY(100px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        /* Cart Modal */
        .cart-modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(8px);
            display: none;
            justify-content: center;
            align-items: flex-end;
            z-index: 200;
            padding: 16px;
        }

        .cart-modal.active {
            display: flex;
        }

        .cart-content {
            background: white;
            border-radius: 40px 40px 0 0;
            width: 100%;
            max-width: 600px;
            max-height: 85vh;
            overflow-y: auto;
            padding: 28px 20px;
            animation: slideUpModal 0.4s ease;
            box-shadow: var(--shadow-lg);
        }

        @keyframes slideUpModal {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }

        .cart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        .cart-header h2 {
            color: var(--dark);
            font-size: 28px;
            font-weight: 700;
        }

        .close-cart {
            background: var(--light);
            border: none;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            font-size: 24px;
            cursor: pointer;
            color: var(--dark);
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .close-cart:active {
            background: var(--gray);
            transform: scale(0.9);
        }

        .cart-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 0;
            border-bottom: 1px solid rgba(0,0,0,0.08);
            animation: fadeInUp 0.4s ease;
        }

        .cart-item-info h4 {
            color: var(--dark);
            margin-bottom: 6px;
            font-size: 18px;
            font-weight: 600;
        }

        .cart-item-info .item-price {
            color: var(--primary);
            font-weight: 700;
            font-size: 16px;
        }

        .cart-item-actions {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .cart-item-actions button {
            background: var(--light);
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            color: var(--dark);
            transition: all 0.2s;
            box-shadow: var(--shadow-sm);
        }

        .cart-item-actions button:active {
            background: var(--primary);
            color: white;
            transform: scale(0.9);
        }

        .cart-item-actions .qty {
            font-size: 18px;
            font-weight: 700;
            min-width: 30px;
            text-align: center;
            color: var(--dark);
        }

        .cart-total-section {
            margin-top: 24px;
            padding-top: 20px;
            border-top: 2px solid var(--primary);
        }

        .total-row {
            display: flex;
            justify-content: space-between;
            font-size: 22px;
            font-weight: 700;
            color: var(--dark);
            margin-bottom: 20px;
        }

        .order-btn {
            background: linear-gradient(145deg, var(--secondary), #1B5E20);
            color: white;
            border: none;
            width: 100%;
            padding: 20px;
            border-radius: 60px;
            font-size: 20px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 8px 20px rgba(46,125,50,0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        .order-btn:active {
            transform: scale(0.97);
        }

        /* Success Modal */
        .success-modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(10px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 300;
            padding: 16px;
        }

        .success-modal.active {
            display: flex;
        }

        .success-content {
            background: white;
            border-radius: 60px;
            padding: 48px 24px;
            max-width: 450px;
            text-align: center;
            animation: popIn 0.5s cubic-bezier(0.2, 0.9, 0.3, 1.2);
            box-shadow: var(--shadow-lg);
            border: 1px solid var(--primary);
        }

        @keyframes popIn {
            0% { opacity: 0; transform: scale(0.7); }
            100% { opacity: 1; transform: scale(1); }
        }

        .success-emoji {
            font-size: 100px;
            margin-bottom: 20px;
            animation: float 3s ease-in-out infinite;
        }

        .success-content h2 {
            color: var(--secondary);
            font-size: 32px;
            margin-bottom: 16px;
            font-weight: 800;
        }

        .success-content p {
            color: var(--dark);
            font-size: 18px;
            line-height: 1.5;
            margin-bottom: 12px;
        }

        .phone-number {
            background: linear-gradient(145deg, var(--light), #E8DDD0);
            padding: 16px;
            border-radius: 50px;
            font-size: 22px;
            font-weight: 700;
            color: var(--primary);
            margin: 20px 0;
            letter-spacing: 1px;
            border: 1px solid var(--primary);
        }

        .time-badge {
            background: var(--dark);
            color: white;
            padding: 12px 24px;
            border-radius: 50px;
            font-size: 20px;
            font-weight: 600;
            margin: 15px 0;
            display: inline-block;
        }

        .close-success {
            background: var(--primary);
            color: white;
            border: none;
            padding: 16px 48px;
            border-radius: 60px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 24px;
            transition: all 0.2s;
            box-shadow: var(--shadow-md);
        }

        .close-success:active {
            transform: scale(0.95);
        }

        /* Анимация загрузки */
        .loading-shimmer {
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
        }
    </style>
</head>
<body>
    <div class="mountains"></div>
    <div class="app">
        <div class="header">
            <h1>⛰️ Горська Шаурма</h1>
            <p>Смак Кавказьких гір у кожному шматочку</p>
        </div>

        <div class="cart-summary empty" onclick="openCart()">
            <span class="cart-icon">🧺 Кошик</span>
            <span class="cart-total" id="cartSummaryTotal">0 грн</span>
        </div>

        <div class="categories">
            <button class="category-btn active" data-category="all">Все</button>
            <button class="category-btn" data-category="shawarma">🌯 Шаурма</button>
            <button class="category-btn" data-category="sauce">🥫 Соуси</button>
            <button class="category-btn" data-category="extra">➕ Добавки</button>
            <button class="category-btn" data-category="drink">🥤 Напої</button>
        </div>

        <div id="menuGrid" class="menu-grid"></div>
    </div>

    <!-- Floating Order Button -->
    <button class="floating-order-btn" id="floatingOrderBtn" onclick="openCart()">
        <span>✅ Оформити замовлення</span>
        <span class="cart-total-mini" id="floatingOrderTotal">0 грн</span>
    </button>

    <!-- Cart Modal -->
    <div id="cartModal" class="cart-modal">
        <div class="cart-content">
            <div class="cart-header">
                <h2>🧺 Ваш кошик</h2>
                <button class="close-cart" onclick="closeCart()">✕</button>
            </div>
            <div id="cartItems"></div>
            <div class="cart-total-section">
                <div class="total-row">
                    <span>Всього:</span>
                    <span id="cartTotal">0 грн</span>
                </div>
                <button class="order-btn" onclick="placeOrder()">
                    <span>✅ Замовити (самовивіз)</span>
                </button>
            </div>
        </div>
    </div>

    <!-- Success Modal -->
    <div id="successModal" class="success-modal">
        <div class="success-content">
            <div class="success-emoji">🏔️✨</div>
            <h2>Замовлення прийнято!</h2>
            <p>Ваша шаурма скоро буде чекати на вас</p>
            <div class="time-badge">⏱️ Заберіть протягом 10-15 хвилин</div>
            <p>Якщо потрібно щось змінити:</p>
            <div class="phone-number" id="shopPhoneDisplay">📞 +380 99 123 45 67</div>
            <p class="small">(Зателефонуйте нам для корекції замовлення)</p>
            <button class="close-success" onclick="closeSuccessModal()">Дякую! 🌯</button>
        </div>
    </div>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        // Меню (с кавказскими эмодзи)
        const menuItems = [
            { id: 1, category: 'shawarma', name: 'Класична (міні)', price: 120, emoji: '🌯' },
            { id: 2, category: 'shawarma', name: 'Класична (стандарт)', price: 160, emoji: '🌯' },
            { id: 3, category: 'shawarma', name: 'Класична (велика)', price: 210, emoji: '🌯' },
            { id: 4, category: 'shawarma', name: 'Сирна', price: 180, emoji: '🧀' },
            { id: 5, category: 'shawarma', name: 'Гостра', price: 175, emoji: '🌶️' },
            { id: 6, category: 'sauce', name: 'Часниковий', price: 25, emoji: '🧄' },
            { id: 7, category: 'sauce', name: 'Сирний', price: 25, emoji: '🧀' },
            { id: 8, category: 'sauce', name: 'Барбекю', price: 25, emoji: '🔥' },
            { id: 9, category: 'sauce', name: 'Гострий', price: 25, emoji: '🌶️' },
            { id: 10, category: 'extra', name: 'Дод. сир', price: 20, emoji: '🧀' },
            { id: 11, category: 'extra', name: 'Халапеньйо', price: 15, emoji: '🥒' },
            { id: 12, category: 'extra', name: 'Бекон', price: 30, emoji: '🥓' },
            { id: 13, category: 'extra', name: 'Гриби', price: 20, emoji: '🍄' },
            { id: 14, category: 'drink', name: 'Coca-Cola 0.5', price: 35, emoji: '🥤' },
            { id: 15, category: 'drink', name: 'Fanta 0.5', price: 35, emoji: '🥤' },
            { id: 16, category: 'drink', name: 'Вода 0.5', price: 20, emoji: '💧' },
        ];

        let cart = [];
        let currentCategory = 'all';

        // Номер магазина (замените на свой)
        const SHOP_PHONE = "+380XXXXXXXXX";
        document.getElementById('shopPhoneDisplay').innerHTML = `📞 ${SHOP_PHONE}`;

        function renderMenu() {
            const grid = document.getElementById('menuGrid');
            const filtered = currentCategory === 'all' ? menuItems : menuItems.filter(item => item.category === currentCategory);
            grid.innerHTML = filtered.map(item => `
                <div class="menu-item" data-id="${item.id}">
                    <div class="emoji-bg">${item.emoji}</div>
                    <h3>${item.name}</h3>
                    <div class="price">${item.price} грн</div>
                    <div class="add-badge" onclick="event.stopPropagation(); addToCart(${item.id})">+ Додати</div>
                </div>
            `).join('');

            // Добавляем обработчик на всю карточку (для добавления)
            document.querySelectorAll('.menu-item').forEach(card => {
                card.addEventListener('click', (e) => {
                    if (!e.target.classList.contains('add-badge')) {
                        const id = card.dataset.id;
                        addToCart(parseInt(id));
                    }
                });
            });
        }

        function addToCart(itemId) {
            const item = menuItems.find(i => i.id === itemId);
            const existing = cart.find(i => i.id === itemId);
            if (existing) {
                existing.qty += 1;
            } else {
                cart.push({ ...item, qty: 1 });
            }
            updateCartUI();
            tg.HapticFeedback.impactOccurred('light');

            // Показываем плавающую кнопку, если корзина не пуста
            if (cart.length > 0) {
                document.getElementById('floatingOrderBtn').classList.add('show');
            }
        }

        function updateCartUI() {
            const total = cart.reduce((sum, item) => sum + item.price * item.qty, 0);
            document.getElementById('cartSummaryTotal').innerText = `${total} грн`;
            document.getElementById('floatingOrderTotal').innerText = `${total} грн`;

            const summaryEl = document.querySelector('.cart-summary');
            if (cart.length === 0) {
                summaryEl.classList.add('empty');
                document.getElementById('floatingOrderBtn').classList.remove('show');
            } else {
                summaryEl.classList.remove('empty');
            }

            // Обновляем корзину, если она открыта
            if (document.getElementById('cartModal').classList.contains('active')) {
                renderCartModal();
            }
        }

        function renderCartModal() {
            const container = document.getElementById('cartItems');
            container.innerHTML = cart.map(item => `
                <div class="cart-item">
                    <div class="cart-item-info">
                        <h4>${item.emoji} ${item.name}</h4>
                        <div class="item-price">${item.price} грн</div>
                    </div>
                    <div class="cart-item-actions">
                        <button onclick="updateQty(${item.id}, -1)">−</button>
                        <span class="qty">${item.qty}</span>
                        <button onclick="updateQty(${item.id}, 1)">+</button>
                        <button onclick="removeItem(${item.id})" style="background:#ff6b6b; color:white;">✕</button>
                    </div>
                </div>
            `).join('');

            const total = cart.reduce((sum, item) => sum + item.price * item.qty, 0);
            document.getElementById('cartTotal').innerText = `${total} грн`;
        }

        function updateQty(itemId, delta) {
            const idx = cart.findIndex(i => i.id === itemId);
            if (idx === -1) return;
            const item = cart[idx];
            item.qty += delta;
            if (item.qty <= 0) {
                cart.splice(idx, 1);
            }
            updateCartUI();
            if (document.getElementById('cartModal').classList.contains('active')) {
                renderCartModal();
            }
            tg.HapticFeedback.impactOccurred('light');
        }

        function removeItem(itemId) {
            cart = cart.filter(i => i.id !== itemId);
            updateCartUI();
            if (document.getElementById('cartModal').classList.contains('active')) {
                renderCartModal();
            }
            tg.HapticFeedback.impactOccurred('medium');
        }

        function openCart() {
            if (cart.length === 0) {
                tg.showAlert('Кошик порожній. Додайте щось смачненьке! 🌯');
                return;
            }
            renderCartModal();
            document.getElementById('cartModal').classList.add('active');
        }

        function closeCart() {
            document.getElementById('cartModal').classList.remove('active');
        }

        function placeOrder() {
            if (cart.length === 0) return;

            const orderData = {
                items: cart.map(item => ({
                    name: item.name,
                    qty: item.qty,
                    price: item.price
                })),
                total: cart.reduce((sum, item) => sum + item.price * item.qty, 0)
            };

            tg.sendData(JSON.stringify(orderData));

            closeCart();
            document.getElementById('successModal').classList.add('active');
            cart = [];
            updateCartUI();
            tg.HapticFeedback.notificationOccurred('success');
        }

        function closeSuccessModal() {
            document.getElementById('successModal').classList.remove('active');
        }

        // Категории
        document.querySelectorAll('.category-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentCategory = btn.dataset.category;
                renderMenu();
            });
        });

        // Закрытие модалок по клику на фон
        document.getElementById('cartModal').addEventListener('click', (e) => {
            if (e.target === document.getElementById('cartModal')) closeCart();
        });
        document.getElementById('successModal').addEventListener('click', (e) => {
            if (e.target === document.getElementById('successModal')) closeSuccessModal();
        });

        renderMenu();
    </script>
</body>
</html>
